# V1 example configuration.
# This file is a template for config/example.yaml.

project:
  name: quantitative_trading_phase0
  timezone: Asia/Shanghai

data:
  source: demo
  # source: tushare
  freq: D
  start: "2024-01-01"
  end: "2024-12-31"
  external_secret_file: "/home/shaofl/Projects/financial_projects/.config.json"
  tushare_token_key: "tushare.token"
  output_name: daily

universe:
  type: static
  symbols:
    - "000001.SZ"
    - "000002.SZ"
    - "000003.SZ"
    - "000004.SZ"
    - "000005.SZ"
  min_listing_days: 60
  filters:
    missing_close: true
    suspended: false
    st: false
    limit_up_down: false

factors:
  - name: momentum_20
    enabled: true
    params:
      window: 20
      price_col: close

processing:
  drop_missing: true
  standardize:
    enabled: true
    method: zscore
  winsorize:
    enabled: false
    method: mad
    n: 3.0
  neutralize:
    enabled: false
    industry_col: industry
    size_col: market_cap

alpha:
  model: equal_weight
  params: {}

portfolio:
  constructor: topn_equal_weight
  top_n: 3
  long_only: true
  max_weight: null
  turnover_cap: null

backtest:
  initial_nav: 1.0
  rebalance: monthly
  event_order: close_to_next_period
  cash_return: 0.0

cost:
  fee_rate: 0.001
  slippage_rate: 0.0
  turnover_formula: l1

analytics:
  forward_return_periods:
    - 1
    - 5
    - 20
  quantiles: 5
  benchmark: null

output:
  root_dir: artifacts
  data_dir: artifacts/data
  factor_dir: artifacts/factors
  report_dir: artifacts/reports
  log_dir: artifacts/logs
  overwrite: true

