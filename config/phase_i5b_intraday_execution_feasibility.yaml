# Phase I5b — intraday execution-time price-limit feasibility (hardening, NOT research).
#
# Same intraday tail-rebalance smoke as I5a (decision 14:50, execute at the first
# valid 1min bar in [14:51, 14:56:59] priced on the active execution_price_basis, exec-to-exec holding returns, PIT-safe I3
# score) PLUS execution-time price-limit feasibility: a buy is blocked at the raw
# upper limit and a sell at the raw lower limit, comparing the RAW price that
# EXECUTES at the selected minute -- the bar VWAP under the default
# execution_price_basis -- to the raw stk_limit band (NEVER qfq / daily close /
# daily-close-derived flags).
#
# Minute bars are read from the EXISTING intraday cache only (read-only; a miss is
# a hard blocker -> zero stk_mins live calls). Raw stk_limit flows through the same
# P4 read-through cache as the daily endpoints (no new endpoint); a fully-covered
# window costs zero stk_limit gap fetches. SSE50 (000016.SH) is SH/SZ-only; the
# short, recent window matches the I5a minute-cache coverage.
#
# This is an execution-feasibility hardening run, NOT a research-alpha run: no new
# factors, no tuning. The report writes to its own name so it never overwrites the
# accepted I5a artifact.

project:
  name: quantitative_trading_phase_i5b_intraday_execution_feasibility
  timezone: Asia/Shanghai
data:
  source: tushare
  freq: D
  start: '2026-03-03'
  end: '2026-06-12'
  external_secret_file: /home/shaofl/Projects/financial_projects/.config.json
  tushare_token_key: tushare.token
  output_name: i5b_daily
  cache:
    enabled: true
    root_dir: artifacts/cache/tushare/v1
    refresh_recent_days: 14
    refresh_dimension_days: 30
    force_refresh: []
universe:
  type: index
  index_code: 000016.SH
  symbols: []
  min_listing_days: 60
  filters:
    # Selection-level daily tradability flags stay DISABLED: at the 14:50 decision
    # the daily-close-derived limit flag is an EOD value not known yet. The honest
    # direction-aware blocking happens at EXECUTION via raw stk_limit vs the RAW
    # price that EXECUTES at that minute (intraday.price_limit_check below).
    # Disclosed in the report.
    missing_close: true
    suspended: false
    st: false
    limit_up_down: false
# factors is required by the schema but the runner ignores it: the score is the I3
# intraday_ret feature, not a config factor. Minimal valid placeholder.
factors:
- name: momentum_20
  enabled: true
  params:
    window: 20
    price_col: close
processing:
  drop_missing: true
  standardize:
    enabled: true
    method: zscore
  winsorize:
    enabled: false
    method: mad
    n: 3.0
  neutralize:
    enabled: false
    industry_col: industry
    size_col: market_cap
    industry_level: L1
alpha:
  model: equal_weight
  params: {}
portfolio:
  constructor: topn_equal_weight
  top_n: 10
  long_only: true
  max_weight: null
  turnover_cap: null
backtest:
  initial_nav: 1.0
  rebalance: monthly
  event_order: intraday_tail_rebalance
  cash_return: 0.0
intraday:
  enabled: true
  decision_time: '14:50:00'
  data_lag: 1min
  session_open: '09:30:00'
  execution_model: next_minute_close
  execution_window:
  - '14:51:00'
  - '14:56:59'
  require_cache_coverage: true
  missing_execution: block
  # I5b: execution-time raw price-limit feasibility (the RAW price that EXECUTES
  # at that minute vs raw stk_limit).
  price_limit_check: true
  require_price_limit_coverage: true
  limit_tolerance: 1.0e-06
cost:
  fee_rate: 0.001
  slippage_rate: 0.0
  turnover_formula: l1
analytics:
  forward_return_periods:
  - 1
  - 5
  - 20
  quantiles: 5
  benchmark: null
output:
  root_dir: artifacts
  data_dir: artifacts/data
  factor_dir: artifacts/factors
  report_dir: artifacts/reports
  log_dir: artifacts/logs
  overwrite: true
  intraday_report_name: phase_i5b_intraday_execution_feasibility
