# Phase 3-2 — REAL walk-forward IC-weighted multi-factor baseline.
#
# Identical universe / window / factors / neutralization to
# config/phase3_real_multifactor.yaml (the EQUAL-WEIGHT baseline) so the two are
# directly comparable; the ONLY change is alpha.model: ic_weighted — factor
# weights are the mean per-factor rank IC over a trailing window of REALIZED
# observations only (a (factor[t], fwd_h[t]) pair enters date d's weights only
# once t + h <= d in trading days). Insufficient history falls back to equal
# weight (disclosed in the report). NO parameter search; NOT a performance claim.
#
# Run:  python -m qt.cli run-phase2-baseline --config config/phase3_real_ic_weighted.yaml
# (shared real-baseline runner; report goes to artifacts/reports/phase3_real_ic_weighted.md.
# Needs the tushare token in the external .config.json; hits the network; heavy.)

project:
  name: quantitative_trading_phase3_real_ic_weighted
  timezone: Asia/Shanghai

data:
  source: tushare
  freq: D
  start: "2023-07-01"
  end: "2024-06-30"
  external_secret_file: "/home/shaofl/Projects/financial_projects/.config.json"
  tushare_token_key: "tushare.token"
  output_name: phase3iw_daily

universe:
  type: index
  index_code: "000016.SH"
  symbols: []
  min_listing_days: 60
  filters:
    missing_close: true
    suspended: true
    st: true
    limit_up_down: true

factors:
  - name: momentum_20
    enabled: true
    params:
      window: 20
      price_col: close
  - name: roe
    enabled: true
    params: {}
  - name: netprofit_yoy
    enabled: true
    params: {}

processing:
  drop_missing: true
  standardize:
    enabled: true
    method: zscore
  winsorize:
    enabled: false
    method: mad
    n: 3.0
  neutralize:
    enabled: true
    industry_col: industry
    size_col: market_cap
    industry_level: L1   # PIT SW level (L1/L2/L3); L1 = 31 broad sectors (standard, DOF-safe)

alpha:
  model: ic_weighted          # P3-2 walk-forward rolling-IC weights
  params:
    window: 60                # trailing trading days of REALIZED ICs (conservative rolling)
    min_periods: 20           # < this many valid realized ICs -> equal-weight fallback (disclosed)
    mode: rolling             # rolling (default) | expanding

portfolio:
  constructor: topn_equal_weight
  top_n: 20
  long_only: true
  max_weight: null
  turnover_cap: null

backtest:
  initial_nav: 1.0
  rebalance: monthly
  event_order: close_to_next_period
  cash_return: 0.0

cost:
  fee_rate: 0.001
  slippage_rate: 0.0
  turnover_formula: l1

analytics:
  forward_return_periods:
    - 1
    - 5
    - 20
  quantiles: 5
  benchmark: null

output:
  root_dir: artifacts
  data_dir: artifacts/data
  factor_dir: artifacts/factors
  report_dir: artifacts/reports
  log_dir: artifacts/logs
  overwrite: true
  baseline_report_name: phase3_real_ic_weighted.md
