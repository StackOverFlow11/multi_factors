# PR-G — Fifth real factor evaluation: intraday amplitude-cut factor.
#
# Reproduces the SECOND factor of the Kaiyuan market-microstructure series #30 (开源证券
# 《高频振幅因子的内部切割——市场微观结构系列（30）》, reportId 4988549) -- the "日内振幅切割因子"
# (§3, thought (2)) -- as a first-class IntradayAmpCutFactor and runs it through the FROZEN
# StandardFactorEvaluator on REAL cached A-share data. CACHE-ONLY: the minute read is
# provably live-call-free; daily / universe / covariate endpoints go through the
# read-through cache (warm -> 0 gap fetches).
#
# DISTINCT FROM PR-D minute_ideal_amp (thought (1), the report flagship): PR-D pools the
# trailing 10 days' 1min bars into ONE set and cuts by minute CLOSE PRICE. This factor cuts
# EACH DAY independently by the 1-MINUTE RETURN r=close_t/close_{t-1}-1 (within-day lagged,
# each day's first bar has no r), taking V_day = V_high - V_low where V_high/V_low are the
# mean amp (high/low-1) of the top/bottom floor(0.20*n_day) bars by return (a day is valid
# iff it has >= 100 valid bars). The trailing 10 VALID days give V_mean / V_std (NaN below
# 6 valid days), which are cross-sectionally z-scored per date over the CSI500 covered set
# (>= 10 finite pairs else NaN) and averaged: factor = (z(V_mean) + z(V_std))/2.
# Pre-registered sign = -1 (report rankIC mean -0.067, rankICIR -3.82, quintile long-short
# 16.7%/yr at N=10, lambda=20%, 1-minute-return indicator). The report finds this factor
# only ~30% correlated with the flagship minute_ideal_amp. NOTE the report is a MONTHLY,
# industry + market-cap neutral, full-market series on Wind data -- our eval cell is CSI500
# daily with industry + size neutral, so those numbers are a LOOSE reference only.
#
# Eval CELL is IDENTICAL to PR-C / PR-D / PR-E / PR-F: universe = CSI500 (000905.SH), PIT
# membership; window = 2021-07-01 .. 2026-06-30 (the project's minute-coverage window);
# daily rebalance; OOS split 2024-01-01; book = value_ep/value_bp/volatility_20; fee 0.001.
# The ONLY substantive difference is the subject factor, which is minute-derived and
# computed by the runner from the intraday cache -- it is NOT a config-listed daily factor.
# The evaluator runs TWICE (see qt/eval_intraday_amp_cut.py): once with NO book (Incremental
# NOT_ASSESSED) and once with the confirmed book to measure whether the amplitude-cut factor
# adds alpha BEYOND value / low-vol.

project:
  name: quantitative_trading_pr_g_intraday_amp_cut
  timezone: Asia/Shanghai
data:
  source: tushare
  freq: D
  start: '2021-07-01'
  end: '2026-06-30'
  external_secret_file: /home/shaofl/Projects/financial_projects/.config.json
  tushare_token_key: tushare.token
  output_name: intraday_amp_cut_daily
  cache:
    enabled: true
    root_dir: artifacts/cache/tushare/v1
    refresh_recent_days: 14
    refresh_dimension_days: 30
    force_refresh: []
universe:
  type: index
  index_code: 000905.SH
  symbols: []
  min_listing_days: 60
  filters:
    missing_close: true
    suspended: false
    st: false
    limit_up_down: false
# factors = the confirmed BOOK used for the Incremental axis (value + low-vol). The
# SUBJECT factor (intraday_amp_cut_10) is minute-derived and computed by the runner from
# the intraday cache -- it is NOT a config-listed daily factor.
factors:
- name: value_ep
  enabled: true
- name: value_bp
  enabled: true
- name: volatility_20
  enabled: true
  params:
    window: 20
    price_col: close
processing:
  drop_missing: true
  standardize:
    enabled: true
    method: zscore
  # winsorize is a P0 no-op in this codebase; the EvalConfig declares winsorize=None
  # accordingly (nothing is clipped), so the report never overstates preprocessing.
  winsorize:
    enabled: false
    method: mad
    n: 3.0
  # Industry + market-cap neutralization (SW-L1), matching the report's neutral column
  # and the EvalConfig neutralization declaration.
  neutralize:
    enabled: true
    industry_col: industry
    size_col: market_cap
    industry_level: L1
alpha:
  model: equal_weight
  params: {}
portfolio:
  # Required by the schema but unused: this runner evaluates a factor, it does not
  # build/execute a portfolio.
  constructor: topn_equal_weight
  top_n: 50
  long_only: true
  max_weight: null
  turnover_cap: null
backtest:
  # Required by the schema but unused (no backtest is run). The EvalConfig uses a DAILY
  # rebalance (contract default), independent of this field.
  initial_nav: 1.0
  rebalance: monthly
  event_order: close_to_next_period
  cash_return: 0.0
cost:
  fee_rate: 0.001
  slippage_rate: 0.0
  turnover_formula: l1
analytics:
  forward_return_periods:
  - 1
  quantiles: 5
  benchmark: null
# OOS split (window midpoint) so the OOS section runs and the Predictive axis can be
# assessed (sign consistency across both holdout subperiods).
oos:
  split_date: '2024-01-01'
output:
  root_dir: artifacts
  data_dir: artifacts/data
  factor_dir: artifacts/factors
  report_dir: artifacts/reports
  log_dir: artifacts/logs
  overwrite: true
