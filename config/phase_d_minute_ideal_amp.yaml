# PR-D — Second real factor evaluation: minute ideal amplitude.
#
# Reproduces the Kaiyuan report §30 factor (分钟理想振幅因子, 市场微观结构系列 30,
# full-market IC -0.059 / ICIR -3.1 / rankIC -0.076, market-cap + industry neutral)
# as a first-class MinuteIdealAmplitudeFactor and runs it through the FROZEN
# StandardFactorEvaluator on REAL cached A-share data. CACHE-ONLY: the minute read is
# provably live-call-free; daily / universe / covariate endpoints go through the
# read-through cache (warm -> 0 gap fetches).
#
# The subject factor pools the trailing 10 trading days of PIT-truncated (14:50)
# minutes per symbol, ranks them by RAW close, and takes the mean-amplitude spread
# (high/low - 1) between the top / bottom 25% by close (N=10, lambda=25%). NOTE: the
# report's CSI500 numbers (rankICIR -2.13, long-short 10.6%) are for the COMBINED
# factor, NOT this single factor — treat them only as a loose reference.
#
# Eval CELL is IDENTICAL to PR-C (phase_c_jump_amount_corr.yaml): universe = CSI500
# (000905.SH), PIT membership; window = 2021-07-01 .. 2026-06-30 (the project's
# minute-coverage window); daily rebalance; OOS split 2024-01-01; book =
# value_ep/value_bp/volatility_20; fee 0.001. The ONLY substantive difference is the
# subject factor, which is minute-derived and computed by the runner from the
# intraday cache — it is NOT a config-listed daily factor. The evaluator runs TWICE
# (see qt/eval_minute_ideal_amplitude.py): once with NO book (Incremental
# NOT_ASSESSED) and once with the confirmed book to measure whether minute ideal
# amplitude adds alpha BEYOND value / low-vol.

project:
  name: quantitative_trading_pr_d_minute_ideal_amp
  timezone: Asia/Shanghai
data:
  source: tushare
  freq: D
  start: '2021-07-01'
  end: '2026-06-30'
  external_secret_file: /home/shaofl/Projects/financial_projects/.config.json
  tushare_token_key: tushare.token
  output_name: minute_ideal_amp_daily
  cache:
    enabled: true
    root_dir: artifacts/cache/tushare/v1
    refresh_recent_days: 14
    refresh_dimension_days: 30
    force_refresh: []
universe:
  type: index
  index_code: 000905.SH
  symbols: []
  min_listing_days: 60
  filters:
    missing_close: true
    suspended: false
    st: false
    limit_up_down: false
# factors = the confirmed BOOK used for the Incremental axis (value + low-vol). The
# SUBJECT factor (minute_ideal_amp_10) is minute-derived and computed by the runner
# from the intraday cache — it is NOT a config-listed daily factor.
factors:
- name: value_ep
  enabled: true
- name: value_bp
  enabled: true
- name: volatility_20
  enabled: true
  params:
    window: 20
    price_col: close
processing:
  drop_missing: true
  standardize:
    enabled: true
    method: zscore
  # winsorize is a P0 no-op in this codebase; the EvalConfig declares winsorize=None
  # accordingly (nothing is clipped), so the report never overstates preprocessing.
  winsorize:
    enabled: false
    method: mad
    n: 3.0
  # Industry + market-cap neutralization (SW-L1), matching the report's neutral
  # column and the EvalConfig neutralization declaration.
  neutralize:
    enabled: true
    industry_col: industry
    size_col: market_cap
    industry_level: L1
alpha:
  model: equal_weight
  params: {}
portfolio:
  # Required by the schema but unused: this runner evaluates a factor, it does not
  # build/execute a portfolio.
  constructor: topn_equal_weight
  top_n: 50
  long_only: true
  max_weight: null
  turnover_cap: null
backtest:
  # Required by the schema but unused (no backtest is run). The EvalConfig uses a
  # DAILY rebalance (contract default), independent of this field.
  initial_nav: 1.0
  rebalance: monthly
  event_order: close_to_next_period
  cash_return: 0.0
cost:
  fee_rate: 0.001
  slippage_rate: 0.0
  turnover_formula: l1
analytics:
  forward_return_periods:
  - 1
  quantiles: 5
  benchmark: null
# OOS split (window midpoint) so the OOS section runs and the Predictive axis can be
# assessed (sign consistency across both holdout subperiods).
oos:
  split_date: '2024-01-01'
output:
  root_dir: artifacts
  data_dir: artifacts/data
  factor_dir: artifacts/factors
  report_dir: artifacts/reports
  log_dir: artifacts/logs
  overwrite: true
