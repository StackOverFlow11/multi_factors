# Phase 2-1 real baseline WITH the P4-1 persistent market cache enabled.
# Identical to phase2_real_baseline.yaml except data.cache.enabled=true +
# a distinct report name. Used for the P4-1 real smoke: run twice; the
# second run makes ZERO market_daily / adj_factor API calls (historical
# window, fully covered). Report metrics must equal the non-cached run.

project:
  name: quantitative_trading_phase2_baseline_cached
  timezone: Asia/Shanghai
data:
  source: tushare
  freq: D
  start: '2023-07-01'
  end: '2024-06-30'
  external_secret_file: /home/shaofl/Projects/financial_projects/.config.json
  tushare_token_key: tushare.token
  output_name: phase2_daily
  cache:
    enabled: true
    root_dir: artifacts/cache/tushare/v1
    refresh_recent_days: 14
    force_refresh: []
universe:
  type: index
  index_code: 000016.SH
  symbols: []
  min_listing_days: 60
  filters:
    missing_close: true
    suspended: true
    st: true
    limit_up_down: true
factors:
- name: momentum_20
  enabled: true
  params:
    window: 20
    price_col: close
processing:
  drop_missing: true
  standardize:
    enabled: true
    method: zscore
  winsorize:
    enabled: false
    method: mad
    n: 3.0
  neutralize:
    enabled: true
    industry_col: industry
    size_col: market_cap
    industry_level: L1
alpha:
  model: equal_weight
  params: {}
portfolio:
  constructor: topn_equal_weight
  top_n: 20
  long_only: true
  max_weight: null
  turnover_cap: null
backtest:
  initial_nav: 1.0
  rebalance: monthly
  event_order: close_to_next_period
  cash_return: 0.0
cost:
  fee_rate: 0.001
  slippage_rate: 0.0
  turnover_formula: l1
analytics:
  forward_return_periods:
  - 1
  - 5
  - 20
  quantiles: 5
  benchmark: null
output:
  root_dir: artifacts
  data_dir: artifacts/data
  factor_dir: artifacts/factors
  report_dir: artifacts/reports
  log_dir: artifacts/logs
  overwrite: true
  baseline_report_name: phase2_real_baseline_cached.md
